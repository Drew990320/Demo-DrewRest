# Blueprint Render — Demo-DrewRest (solo artefactos empaquetados).
# Repo: https://github.com/Drew990320/Demo-DrewRest.git
# Regenerar con: npm run Render:Publicar-Demo

databases:
  - name: drewrest-demo-db
    plan: free
    databaseName: restaurant_pos
    user: drewrest

services:
  - type: web
    name: drewrest-demo-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install --omit=dev && node prisma/render-db-setup.js && node prisma/ensure-mesas-virtuales.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LICENSE_SKIP
        value: "true"
      - key: PRINTER_ENABLED
        value: "false"
      - key: RESTAURANT_NAME
        value: DrewRest Demo
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: drewrest-demo-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: drewrest-demo-web
    runtime: static
    rootDir: web
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /fonts/*
        destination: /fonts/:splat
      - type: rewrite
        source: /assets/*
        destination: /assets/:splat
      - type: rewrite
        source: /_expo/*
        destination: /_expo/:splat
      - type: rewrite
        source: /*
        destination: /index.html
