# Blueprint Render — Demo-DrewRest (solo artefactos empaquetados).
# Repo: https://github.com/Drew990320/Demo-DrewRest.git
# Regenerar con: npm run Render:Publicar-Demo
#
# La web sigue siendo static en Render, con rewrite /api/* → API (same-origin
# en el navegador: solo se ve *-web.onrender.com). Tras cambiar routes, sincroniza
# el Blueprint en Render (o añade la regla en Redirects/Rewrites del servicio web).

databases:
  - name: drewrest-demo-db
    plan: free
    databaseName: restaurant_pos
    user: drewrest

services:
  - type: web
    name: drewrest-demo-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install --omit=dev && node prisma/render-db-setup.js && node prisma/ensure-mesas-virtuales.js && node prisma/ensure-superadmin.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LICENSE_SKIP
        value: "true"
      - key: PRINTER_ENABLED
        value: "false"
      - key: TICKET_PREVIEW_ENABLED
        value: "true"
      - key: RESTAURANT_NAME
        value: DrewRest Demo
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: drewrest-demo-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DEMO_WEB_URL
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PUBLIC_WEB_URL
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: drewrest-demo-web
    runtime: static
    plan: free
    rootDir: web
    staticPublishPath: .
    routes:
      # Same-origin proxy: /api/foo → API /foo (el navegador solo ve *-web)
      - type: rewrite
        source: /api/*
        destination: https://drewrest-demo-api.onrender.com/*
      - type: rewrite
        source: /fonts/*
        destination: /fonts/:splat
      - type: rewrite
        source: /assets/*
        destination: /assets/:splat
      - type: rewrite
        source: /_expo/*
        destination: /_expo/:splat
      - type: rewrite
        source: /*
        destination: /index.html
