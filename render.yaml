# Blueprint Render — Demo-DrewRest (solo artefactos empaquetados).
# Repo: https://github.com/Drew990320/Demo-DrewRest.git
# Regenerar con: npm run Render:Publicar-Demo
#
# La web es Node (no static): sirve el export Expo y proxea /api → API_ORIGIN
# para que el navegador no vea el host *-api.onrender.com.

databases:
  - name: drewrest-demo-db
    plan: free
    databaseName: restaurant_pos
    user: drewrest

services:
  - type: web
    name: drewrest-demo-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install --omit=dev && node prisma/render-db-setup.js && node prisma/ensure-mesas-virtuales.js && node prisma/ensure-superadmin.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LICENSE_SKIP
        value: "true"
      - key: PRINTER_ENABLED
        value: "false"
      - key: TICKET_PREVIEW_ENABLED
        value: "true"
      - key: RESTAURANT_NAME
        value: DrewRest Demo
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: drewrest-demo-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DEMO_WEB_URL
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PUBLIC_WEB_URL
        fromService:
          type: web
          name: drewrest-demo-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: drewrest-demo-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: API_ORIGIN
        fromService:
          type: web
          name: drewrest-demo-api
          envVarKey: RENDER_EXTERNAL_URL
