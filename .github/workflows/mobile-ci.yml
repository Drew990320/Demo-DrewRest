name: Mobile CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-domain/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-domain/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/mobile/package-lock.json
            packages/shared-domain/package-lock.json

      - name: Install shared-domain
        working-directory: packages/shared-domain
        run: npm ci

      - name: Test shared-domain
        working-directory: packages/shared-domain
        run: npm test

      - name: Install mobile
        working-directory: apps/mobile
        run: npm ci

      - name: Typecheck mobile
        working-directory: apps/mobile
        run: npm run typecheck
