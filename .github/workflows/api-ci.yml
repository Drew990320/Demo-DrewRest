name: API CI

on:
  push:
    branches: [main, master]
    paths:
      - 'services/api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'services/api/**'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: api-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: services/api

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: la_reserva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d la_reserva_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/la_reserva_test?schema=public
      JWT_SECRET: ci-test-jwt-secret
      PRINTER_ENABLED: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Ensure virtual tables (mesas 98/99)
        run: npm run prisma:ensure-mesas

      - name: Unit tests
        run: npm test

      - name: E2E and integration tests
        run: npm run test:e2e

      - name: Build
        run: npm run build
